# Workflow d'intégration continue (CI)
# Lint + tests sur Windows / macOS / Linux × Python 3.10 / 3.11 / 3.12.
# Bilingue : commentaires en français, étapes nommées EN (FR).

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies (Installer dépendances dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint (Vérification lint Ruff)
        run: ruff check src tests

      - name: Ruff format check (Vérification formatage Ruff)
        run: ruff format --check src tests

      - name: Mypy strict (Vérification de types mypy strict)
        run: mypy src

  test:
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Tesseract on Ubuntu (Installer Tesseract sous Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra tesseract-ocr-eng

      - name: Install Tesseract on macOS (Installer Tesseract sous macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract tesseract-lang

      - name: Install Tesseract on Windows (Installer Tesseract sous Windows)
        if: runner.os == 'Windows'
        run: choco install tesseract --no-progress

      - name: Install package (Installer le paquet)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[ocr,dev]

      - name: Run pytest (Exécuter pytest)
        run: pytest --cov=trimtokens --cov-report=term-missing --cov-report=xml

      - name: Upload coverage (Téléverser la couverture)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
